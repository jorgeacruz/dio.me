
<!-- Se estiver carregando, exibe o spinner por cima de tudo -->
@if (isLoadingState()) {
  <app-loading-spinner [isLoading]="isLoadingState()" />
}

<main class="flex flex-col w-full h-screen items-center dark:bg-gray-900 "> 
    <app-menubar-component></app-menubar-component>
    <app-title-component></app-title-component>
    <router-outlet></router-outlet>
    <app-footer-component></app-footer-component>
</main>
